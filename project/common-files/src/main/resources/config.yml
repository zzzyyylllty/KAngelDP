# 调试模式 debug
# Debug mode
debug: false

# 语言 language
lang: en_US

options:
  level:
    # 每次更新最多升级多少级，此选项可以有效避免经验配置错误带来的更新卡死
    update-limit: 10
    # 替换原版等级 null为不替换
    override-vanilla: main


database:
  enable: false  # true: MySQL; false: SQLite
  filename: data # data.db for SQLite Database File.
