display:
  name: "Sample Dungeon"
  icon:
    material: DIAMOND_SWORD # Support like craftengine:default:topaz
    parameters:
      item_model: "minecraft:iron_sword"
  description: |-
    Hello world
map:
  type: MAP # MAP, SCHEMATIC
  source: sample
  spawn:
    x: 77
    y: -58
    z: 191
meta:
  global:
    sample_meta: 1
  player:
    sample_meta: 1
gameplay:
  general:
    timeLimit: 600
    preparationTime: 10
    leaveOnDeath: false
    # Death configuration / 死亡机制配置
    # mode: RESPAWN (等待复活, 默认) | SPECTATE (旁观模式) | POSSESS (附身观看) | LEAVE (退出地牢)
    # maxRespawns: 最大复活次数, 0 表示无限制, -1 表示禁止复活
    # autoRespawnDelay: 自动复活延迟（秒）, 0 表示需手动触发
    # keepInventoryOnRespawn: 复活时是否保留背包
    # respawnAtSpawn: 复活后是否传送回出生点
    death:
      mode: RESPAWN
      maxRespawns: 3
      autoRespawnDelay: 5
      keepInventoryOnRespawn: false
      respawnAtSpawn: true
    adventureMode: true
    minPlayers: 1
    maxPlayers: 5
    allowParty: true
    keepInventory:
      enabled: true
      requiredLives: false
    bannedItems:
      - ENDER_PEARL
    # Block placement control / 方块放置控制
    blockPlace:
      mode: BLACKLIST          # BLACKLIST / WHITELIST
      list:
        - TNT
        - LAVA_BUCKET
    # Block breaking control / 方块破坏控制
    blockBreak:
      mode: BLACKLIST          # BLACKLIST / WHITELIST
      list:
        - TNT
  commands:
    mode: BLACKLIST
    list:
      - tpa
  sequence:
    timer:
      mode: COUNTDOWN
      start: 600
vanillaOptions:
  hungry: true
  healthRegain:
    food: false
    saturation: false
    potions: false
    other: false
  durability: true
  itemsDrop: true
  itemsPickup: true
  spawnpoint: 77 -58 191
  # Game rules applied on dungeon start / 地牢开始时自动设置的 Minecraft 游戏规则
  gameRules:
    doTileDrops: false
    doDaylightCycle: false
    doWeatherCycle: false
    keepInventory: true
    naturalRegeneration: false
agent:
  # ============ onCheck / onCheckFail ============
  # Check if the player can start the dungeon / 检查玩家是否能开始地牢
  onCheck: |-
    player.health >= 10
  onCheckFail: |-
    player.sendMessage(mmUtil.deserialize("<gray>Your health is < 10, dungeon sequence cancelled."))

  # ============ onLeave / onLeaveFail ============
  # Check if the player can leave the dungeon / 检查玩家能否离开地牢
  # Return false to prevent leaving / 返回 false 阻止离开
  onLeave: |-
    instance.getMetaAsInt("wave") == null || instance.getMetaAsInt("wave") < 3
  onLeaveFail: |-
    player.sendMessage(mmUtil.deserialize("<red>You cannot leave during wave 3+!</red>"));

  # ============ onStart ============
  # Called when the dungeon starts / 地牢开始时调用
  onStart: |-
    Bukkit.broadcast(mmUtil.deserialize("<gray>Dungeon <yellow>" + template.name + "</yellow> Started."));
    instance.sendActionBarToAllPlayers("<gold>Prepare for battle!</gold>");
    instance.setWorldTime(1000);
    instance.setWorldStorm(false);

    // [Target Selector / 目标选择器] Give buffs to high-level players / 给高等级玩家加 Buff
    var elites = instance.selectTargets("@all[level>=10]");
    elites.forEach(function(p) {
      instance.applyPotionEffectToPlayer(p.getName(), "SPEED", 6000, 1);
    });

    // [Scoreboard Tags / 计分板标签] Mark all players / 标记所有玩家
    instance.addScoreboardTagToAllPlayers("in_dungeon");

    // [World / 世界操作] Set difficulty and gamerule / 设置难度和游戏规则
    instance.setWorldDifficulty("hard");
    instance.setGameRule("doMobSpawning", "true");

    // [Meta / 元数据] Record start info / 记录开始信息
    instance.setMeta("wave", 1);
    instance.setMeta("start_time", Sys.currentTimeMillis());

  # ============ onComplete ============
  # Called when the dungeon is completed / 地牢通关时调用
  onComplete: |-
    Bukkit.broadcast(mmUtil.deserialize("<gray>Dungeon <yellow>" + template.name + "</yellow> Completed."));
    instance.healAllPlayers();
    instance.executeCommand("say Congratulations!");
    instance.clearAllPlayersEffects();

    // Reward all online players who survived (not in deadPlayers) / 奖励所有存活玩家
    var allPlayers = instance.getAllPlayers();
    for (var i = 0; i < allPlayers.length; i++) {
      var p = allPlayers[i];
      if (!instance.isPlayerDeadInDungeon(p.getName())) {
        p.sendMessage(mmUtil.deserialize("<green>You survived!"));
      }
    }

    // [Meta / 元数据] Record completion time / 记录通关时间
    var elapsed = (Sys.currentTimeMillis() - instance.getMeta("start_time")) / 1000;
    instance.setMeta("completion_time", elapsed);

    // [Scoreboard / 计分板] Clean up tags / 清除标签
    instance.removeScoreboardTagFromAllPlayers("in_dungeon");

    // [World / 世界操作] Restore world border / 恢复边界
    instance.setWorldBorder(0.0, 0.0, 600.0);

  # ============ onFail ============
  # Called when the dungeon is failed / 地牢失败时调用
  onFail: |-
    Bukkit.broadcast(mmUtil.deserialize("<gray>Dungeon <yellow>" + template.name + "</yellow> Failed."));
    instance.respawnAllDeadPlayers();

    // Notify dead players via deadPlayers set (not unreliable health check) / 通过死亡集合通知
    var deadNames = instance.getDeadPlayerNames();
    for (var i = 0; i < deadNames.length; i++) {
      var p = Bukkit.getPlayerExact(deadNames[i]);
      if (p != null) {
        p.sendMessage(mmUtil.deserialize("<red>Better luck next time!</red>"));
      }
    }
    instance.removeScoreboardTagFromAllPlayers("in_dungeon");

  # ============ onWaveStart (custom / 自定义触发器) ============
  # Example: called by dungeon script to start a new wave / 由地牢脚本调用以开始新波次
  onWaveStart: |-
    var waveNum = instance.getMetaAsInt("wave");

    // [Title / 标题] Show wave number / 显示波次数
    instance.sendTitleToAllPlayers("<red>Wave " + waveNum + "</red>", "<yellow>Get ready!</yellow>", 10, 40, 10);

    // [Potion / 药水] Give resistance at wave start / 波次开始时给予抗性
    instance.applyPotionEffectToAllPlayers("RESISTANCE", 60, 0);

    // [Meta / 元数据] Increment wave counter / 递增波次计数
    instance.addMeta("wave", 1);

    // [Sound / 音效] Play howl at spawn point / 在出生点播放心跳声
    instance.playSoundAt("entity_wolf_howl", 100.0, 64.0, 200.0, 2.0, 1.0);

# ===== Join Requirements / 进入要求 =====
join-requirements:
  min-level: 0
  required-permissions: []
  required-items: []
  required-money: 0.0

# ===== Visual Effects / 视觉特效 =====
# 在地牢生命周期各阶段显示自定义标题和播放音效
# 留空或省略则使用默认行为
visual:
  start-title: ""
  start-subtitle: ""
  start-sound:
    sound: ""
    volume: 1.0
    pitch: 1.0
  complete-title: ""
  complete-subtitle: ""
  complete-sound:
    sound: ""
    volume: 1.0
    pitch: 1.0
  fail-title: ""
  fail-subtitle: ""
  fail-sound:
    sound: ""
    volume: 1.0
    pitch: 1.0

# ===== Environment / 环境控制 =====
# 地牢开始时的世界环境设置
environment:
  allow-fly: false
  game-mode: ADVENTURE
  fly-speed: 0.1
  walk-speed: 0.2
  potion-effects: []
  world-border:
    size: 256.0
    center-x: 0.0
    center-z: 0.0
  time-lock: 6000
  weather-lock: CLEAR

# ===== Rewards / 通关奖励 =====
rewards:
  complete-commands: []
  fail-commands: []
  complete-items: []
  complete-money: 0.0
  complete-experience: 0
  per-player: true

# ===== Misc / 其他设置 =====
misc:
  join-while-running: false
  max-deaths: -1
  kick-on-max-deaths: SPECTATE
  title-join: ""
  title-leave: ""

# ===== Breakable Blocks / 可破坏方块 =====
breakable-blocks: []                    # 白名单：仅列表中的方块可破坏，留空则使用 blockBreak 规则

# ===== Player Blocks / 玩家放置的方块 =====
player-blocks:
  track-placed: false                   # 是否追踪玩家放置的方块
  clear-on-end: false                   # 地牢结束时是否恢复被替换的方块
  max-blocks-per-player: -1             # 每名玩家最大放置数量，-1=无限
